    <script type="text/javascript">

      function setup_editor(div, flowstring) {

        var diagram_div = div.find(".diagram");
       // alert("HELLO")
        
        // Setup the editor diagram
          try {
            diagram_div.html('');
            var diagram_div = div.find(".diagram");
            var diagram = Diagram.parse(flowstring);   //yogesh replaced editor.getValue() by editor.getValue().replace(/\[(.+?)\]/g, "") this will remove square brackets from diagram
         //   alert("hello")
            // Clear out old diagram
            $("#flowdia").html('');

            var options = {
              theme: 'simple',
              scale: 1
            };

            // Draw
            diagram.drawSVG('flowdia', options);


          } catch (err) {
            var annotation = {
              type: "error", // also warning and information
              column: 0,
              row: 0,
              text: err.message
            };
            if (err instanceof Diagram.ParseError) {
              annotation.row = err.loc.first_line - 1;
              annotation.column = err.loc.first_column;
            }
            //editor.getSession().setAnnotations([annotation]);
            throw err;
          }
        
      }

     

      function viewFlow() {
        setup_editor($('#demo'));
      };
    </script>

<script>
  //this script is just for Getting the testcases of the template
  $('#gettempbtn').on("click", function(){
    removeAllOptions();
    var select = document.getElementById("source-select-temp");
   // alert(select.value);
    var template = document.getElementById('source-select-temp').selectedOptions[0].value;;
    //alert(template);
    

    $.getJSON('\\modifyexistingtemp',
    {template:template.replace(/(^\d+)(.+$)/i,'$1')},
    function(data) {
      //  alert(data.res);
        console.log("Completed the Modification of Template")
        //alert(data.TestcasesforTemp);
        console.log(data.TestcasesforTemp);
        var target_select = document.getElementById("dynamic-select")
        for (var key in data.TestcasesforTemp) {
          if (data.TestcasesforTemp.hasOwnProperty(key)) {
            var val = data.TestcasesforTemp[key];
            console.log(key+ " "+val);
            target_select.options[target_select.options.length] = new Option(key+ " "+val, key+ " "+val);

            //display modify button
            var x = document.getElementById("modifytempbtn");
            if (x.style.display === "none") {
              x.style.display = "block";
            }

          }
        }
	     // target_select.options[target_select.options.length] = new Option("ABC", "XYZ");

    });
    
  });

</script>

<script>
  //this script is just for Modifying  the template
  $('#modifytempbtn').on("click", function(){
    var selectElement = document.querySelectorAll('[name=temptc]');
    let optionValues = [...selectElement[0].options].map(o => o.value)
    console.log(optionValues);
    var testid_str = "";
    for(i =0; i < optionValues.length; i++){
      optionValues[i] = optionValues[i].replace(/(^\d+)(.+$)/i,'$1');
      if(i === 0)
          testid_str = optionValues[i];    
      else
          testid_str = testid_str + ','+optionValues[i];
    }
    console.log(optionValues);
    let template_info = document.getElementById("source-select-temp").value;
    tempid = template_info.split(" ");
    tempid = tempid[0];
    //alert(tempid)
    //alert("YOGESH");
    $.getJSON('\\modifytemplate',
                        {testidlist:testid_str, template_id: tempid},
                        function(data) {
                            alert(data.res);
                            console.log("Started the Modification of Templates");
                            window.reload();
                        });
    
  });

</script>

<script>
    function addOption(){
	var select = document.getElementById("source-select");
  //alert(select.value)
  var target_select = document.getElementById("dynamic-select")
	target_select.options[target_select.options.length] = new Option(select.value, select.value);
}

function removeOption(){
	var select = document.getElementById("dynamic-select");
	select.options[select.options.length - 1] = null;
}

function removeAllOptions(){
	var select = document.getElementById("dynamic-select");
	select.options.length = 0;
}
