# IP of the U-PLANE of SBC (Receving side)
SBC_ADDRESS = 192.168.5.47

# IP address of the FT( sending side)
FT_ADDRESS = 192.168.5.12

# Specifies delay between each consecutive RTP packets.
# It shall be a whole number.
# Value of 'N' means a delay of N*20 msec.
# Value should be given as '0' for No delay.
SET_DELAY = 0

# Timestamp field for each packet for same call_id shall be 
# incremented by this value, for any packet that is sent for
# the same call in next cycle. 
# Value in milli seconds
TIMESTAMP_DELAY = 160 

# Its is the starting value of the call index in this FT.
# If the value is set to 'X' then CALL_N means the configuration
# of call 'N + X'
BASE_INDEX = 0

# call related parameters
# It shall start with CALL_N, where N is the call identifier
# N shall be a whole number
# It shall end with the END_CALL
CALL_0
# this shall be the destination port of SBC for CALL_N 
SBC_PORT = 35004
# this shall be the source port of the FT for CALL_N
FT_PORT = 49152
# this parameter contains the references of all the packets 
# that need to be sent for this call.
# Note that only one packet shall be sent in each cycle for 
# a call. 
# A maximum of 10 packet references can be given for a call.
# this means that, these 10 packets will be sent in order
# (one in each cycle) and repetition of sequence would 
# happen only after each packet is sent once.
# This parameter is optional and if the user does not 
# specify it then no packets shall be sent for this call.
PACKET_REF_1 = 1&2&11&12
# this is the sequence number for the first packet of this call.
# Sequence number of a call keeps incrementing in all cycles 
# This parameter is optional and if the user does not 
# specify it then first packet for this call shall be sent 
# with sequence number = 0.
# the range of the initial value of SEQ_NUM is 0 to 255
SEQ_NUM = 5
# Timestamp field for initial packet for this call
# Value in milli seconds
TIMESTAMP = 30
# specifier for the end of call related parameters
END_CALL

